<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 방안 A -->
  <text x="200" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#2B579A">방안 A: 단일 테이블</text>

  <rect x="30" y="45" width="340" height="35" rx="6" fill="#2B579A" filter="url(#shadow)"/>
  <text x="200" y="68" text-anchor="middle" font-size="13" fill="white" font-weight="bold">customers</text>

  <rect x="30" y="80" width="340" height="28" fill="#E8F0FE" stroke="#B0C4DE" stroke-width="1"/>
  <text x="45" y="99" font-size="12" fill="#333">id</text>
  <text x="120" y="99" font-size="12" fill="#333">name</text>
  <text x="200" y="99" font-size="12" fill="#333">email</text>
  <text x="280" y="99" font-size="12" fill="#888">...</text>

  <rect x="30" y="108" width="340" height="28" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="45" y="127" font-size="12" fill="#E65100" font-weight="bold">point_1</text>
  <text x="140" y="127" font-size="12" fill="#E65100" font-weight="bold">point_2</text>
  <text x="240" y="127" font-size="12" fill="#E65100" font-weight="bold">point_3</text>

  <rect x="30" y="136" width="340" height="25" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <text x="45" y="153" font-size="11" fill="#666">1 | 김철수 | kim@... | 1000 | 500 | 200</text>
  <rect x="30" y="161" width="340" height="25" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="45" y="178" font-size="11" fill="#666">2 | 이영희 | lee@... | 0 | 0 | 0</text>
  <rect x="30" y="186" width="340" height="25" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <text x="45" y="203" font-size="11" fill="#666">3 | 박민수 | park@... | 3000 | 100 | 0</text>

  <text x="200" y="235" text-anchor="middle" font-size="11" fill="#4CAF50" font-weight="bold">✓ 하나의 테이블에서 모두 관리</text>
  <text x="200" y="252" text-anchor="middle" font-size="11" fill="#4CAF50">JOIN 불필요, 쿼리 단순</text>

  <!-- 방안 B -->
  <text x="670" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#2B579A">방안 B: 테이블 분리</text>

  <rect x="500" y="45" width="340" height="35" rx="6" fill="#2B579A" filter="url(#shadow)"/>
  <text x="670" y="68" text-anchor="middle" font-size="13" fill="white" font-weight="bold">customers</text>

  <rect x="500" y="80" width="340" height="28" fill="#E8F0FE" stroke="#B0C4DE" stroke-width="1"/>
  <text x="515" y="99" font-size="12" fill="#333">id</text>
  <text x="590" y="99" font-size="12" fill="#333">name</text>
  <text x="670" y="99" font-size="12" fill="#333">email</text>
  <text x="750" y="99" font-size="12" fill="#888">...</text>

  <rect x="500" y="108" width="340" height="25" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <text x="515" y="125" font-size="11" fill="#666">1 | 김철수 | kim@...</text>
  <rect x="500" y="133" width="340" height="25" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="515" y="150" font-size="11" fill="#666">2 | 이영희 | lee@...</text>
  <rect x="500" y="158" width="340" height="25" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <text x="515" y="175" font-size="11" fill="#666">3 | 박민수 | park@...</text>

  <!-- 관계선 -->
  <line x1="670" y1="195" x2="670" y2="230" stroke="#FF7043" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="685" y="218" font-size="10" fill="#FF7043" font-weight="bold">1:1 FK</text>
  <polygon points="666,228 674,228 670,236" fill="#FF7043"/>

  <!-- 포인트 테이블 -->
  <rect x="500" y="240" width="340" height="35" rx="6" fill="#FF7043" filter="url(#shadow)"/>
  <text x="670" y="263" text-anchor="middle" font-size="13" fill="white" font-weight="bold">customer_points</text>

  <rect x="500" y="275" width="340" height="28" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1"/>
  <text x="515" y="294" font-size="12" fill="#E65100">customer_id</text>
  <text x="620" y="294" font-size="12" fill="#E65100">point_1</text>
  <text x="710" y="294" font-size="12" fill="#E65100">point_2</text>
  <text x="790" y="294" font-size="12" fill="#E65100">point_3</text>

  <rect x="500" y="303" width="340" height="25" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <text x="515" y="320" font-size="11" fill="#666">1 | 1000 | 500 | 200</text>
  <rect x="500" y="328" width="340" height="25" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="515" y="345" font-size="11" fill="#666">3 | 3000 | 100 | 0</text>

  <text x="670" y="378" text-anchor="middle" font-size="11" fill="#FF7043" font-weight="bold">⚠ 조회 시 항상 JOIN 필요</text>
  <text x="670" y="395" text-anchor="middle" font-size="11" fill="#FF7043">별도 인덱스 + 행 오버헤드 발생</text>

  <!-- 구분선 -->
  <line x1="450" y1="25" x2="450" y2="410" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,4"/>
</svg>